syringe.use = Vous vous injectez avec la seringue et vous sentez une légère poussé d'adrénaline.
finesyringe.use = Vous vous injectez avec la seringue et vous sentez une poussé d'adrénaline.
veryfinesyringe.use.huge = Vous vous injectez avec la seringue et vous sentez une grande poussé d'adrénaline.
