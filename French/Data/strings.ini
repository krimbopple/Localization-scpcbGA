veryfinesyringe.use.stomacheache = Vous vous injectez avec la seringue et vous sentez une douleur dans votre estomac.
pill.use = Vous avalez la pilule.
pill.use.healnausea = Vous avalez la pilule. La nausée part légèrement.
cigarette.use.unable = Vous ne pouvais pas l'allumer.
cigarette.use_1 = "J'ai rien pour l'allumer. Euh, peut-être avec... J'ai rien dit."
cigarette.use_2 = "J'en ai arrêter depuis bien longtemps."
cigarette.use_3 = "Même si j'en voulais un, j'ai rien pour l'allumer."
cigarette.use_4 = "J'en voudrais vraiment une maintenant... Si seulement j'avais un briquet."
cigarette.use_5 = "Je ne compte pas le faire, même dans une situation comme celle-ci."
420j.use.714 = "MEC POURQUOI CE SHIT NE MARCHE PAS, C DE LA DAUBE"
420j.use = "MEC C DU BON SHIT SA MERE"
420j.use.nap = "EUH OÙ... JE FAISAIS QUOI DÉJÀ... MEC J'AI BESOIN D'UNE SIESTE..."
