[Death Message]
008 = Le sujet D-9341 a été trouvé en train d'ingérer le Dr [EXPURGÉ] dans le secteur [EXPURGÉ]. Le sujet a été immédiatement éliminé par les Renards à Neuf-Queues et envoyé pour autopsie. L'infection par SCP-008 a été confirmée, après quoi le corps a été incinéré.
008.gate = Le sujet D-9341 a été trouvé en train de balader autour de {0}. Le sujet a été immédiatement éliminé par les Renards à Neuf-Queues et envoyé pour autopsie. L'infection par SCP-008 a été confirmée, après quoi le corps a été incinéré.
008.gate.a = Gate A
008.gate.b = Gate B
008zombie = Sujet D-9341. Cause du décès : multiples lacérations et traumatisme contondant grave causés par [DONNÉES SUPPRIMÉES], qui était infecté par SCP-008. Le sujet a été localisé par les Renards à Neuf-Queues et éliminé.
012 = Le sujet D-9341 a été retrouvé dans une mare de sang à côté de SCP-012. Le sujet semble s'être ouvert les poignets et avoir ajouté trois lignes supplémentaires avant de mourir d'une hémorragie.
035.chamber = Le sujet de classe D D-9341 a été retrouvé mort à l'intérieur de la chambre de confinement de SCP-035. Le sujet présente une hémorragie importante des vaisseaux sanguins autour des yeux et à l'intérieur de la bouche et du nez. Envoyé pour autopsie.
035.tentacle = "On a besoin plus qu'une équipe de nettoyage habituelle. Deux appendices ressemblant à des tentacules, grands et très actifs, semblent s'être formés à l'intérieur de la chambre. Leur niveau d'agressivité est sans précédent, on dirait qu'ils aient battu à mort un sujet de classe D à un moment donné pendant la brèche."
035.tentacle.office = "Une appendices ressemblant à un tentacule et très actif semblent avoir poussé en dehors du corps sans vie d'un scientifique dans la zone de bureau [EXPURGÉ]. Leur niveau d'agressivité est sans précédent, on dirait qu'ils aient battu à mort un sujet de classe D à un moment donné pendant la brèche."
049 = Une instance active de SCP-049-2 aurait été découvert dans [EXPURGÉ]. Éliminée par les Renards à Neuf-Queues.
049.chamber = Trois (3) instances actives de SCP-049-2 aurait été découvert dans le tunnel à l'exterieur de la chambre de confinement de SCP-049. Éliminées par les Renards à Neuf-Queues.
0492 = Sujet D-9341. Cause du décès: multiples lacérations et traumatisme contondant grave causés par une instance de SCP-049-2
096 = Une large quantité de sang est retrouvé dans [DONNÉE EXPURGÉ]. L'ADN est identifié en tant que sujet D-9341. Probablement [DONNÉE EXPURGÉ] par SCP-096.
106.pd = Sujet D-9341. Le corps est pariellement décomposé ce qui lié à l'effet de "corrosion" de SCP-106. Le corps est détruit par incinération.
106.pd.crushed = En plus de l'apparence décomposée typique des victimes de SCP-106, le corps présente des blessures qui n'ont jamais été observées auparavant : fracture massive du crâne, trois côtes cassées, fracture de l'épaule et multiples lacérations graves.
106.pd.fall = En plus de l'apparence décomposée typique des victimes de SCP-106, le sujet semble souffrir de nombreuses lourdes fractures au niveau des jambes.
173 = Sujet D-9341. Cause du décès: Fracture Cervicale mortelle. On suppose qu'il est attaqué par SCP-173.
173.camera = Sujet D-9341. Cause du décès: Fracture Cervicale mortelle. Les archives des vidéos de survaillance ont confirmé que le sujet a été tué par SCP-173.
173.intro = Sujet D-9341. Cause du décès: Fracture Cervicale mortelle. Selon le Chef de Sécurité Fraklon qui était présent dans la chambre de confinement de SCP-173 durant la brèche, le sujet a été tué par SCP-173 dès que des problèmes du réseau éléctriques ont débuté..
173.doors = "Si je ne me trompe pas, une des raisons principales des chambres était d'arrêter SCP-173 d'aller plus loin lors d'un évènement de brèche de confinement. Donc, qui est le génie qui a eu l'idée de mettre un PUTAIN DE CONDUIT DE VENTILATION DE LA TAILLE D'UN HUMAIN ICI ?"
205 = Le cyclde de SCP-205 semble d'avoir repris son cours normal après les anomalies observées pendant [EXPURGÉ]. Le corps du sujet D-9341 a été retrouvé à l'intérieur de la chambre de confinement. Le sujet présente des signes de traumatisme contondant typiques du personnel qui est entré dans la chambre alors que les lumières étaient éteintes.
420js = Le sujet D-9341 est retrouvé dans un état de comatose dans [DONNÉE EXPURGÉ]. Le sujet avait pris ce qu'il semblait être une cigarette pendant qu'il souriait énormément. Une analyse chimique de la cigarette n'a pas été concluante, bien qu'elle semble contenir une forte concentration d'un produit chimique non identifié dont la structure moléculaire est remarquablement similaire à celle du tétrahydrocannabinol.
427 = "Demande de support de la FIM Nu-7. On a besoin de plus de puissance feu pour le mettre à terre."
895 = "Ce qu'on le sait, c'est qu'il est mort d'un arrêt cardiaque. Ma théorie est qu'il a été causé par SCP-895, bien qu'aucun effet sur les équipements vidéo n'ait jamais été observé à une telle distance auparavant. Des tests supplémentaires sont nécessaires pour déterminer si la 'zone rouge' de SCP-895 s'est étendue.
895.nvg = "Le classe D a vu SCP-895 à travers une paire de lunettes de vision nocturnes digitales, le tuant."
895.finenvg = "Le classe D a vu SCP-895 à travers une paire de lunettes de vision nocturnes digitales, possiblement amélioré par SCP-914. Il est probable que le sujet était capable de résister les effets mémétiques partiellement à travers les lunettes. Les lunettes ont été stocké pour une étude approfondie."
914.rough = "Un corps lourdement mutilé a été trouvé à l'intérieur du compartiement de sortie de SCP-914. Un test ADN a identifié le corps comme le sujet de classe D, D-9341. Le sujet a évidemment été raffiné par SCP-914 avec le paramètre 'Grossier', mais on est confus de comment il a pu réussir à entrer dans la cabine d'entrée et qui ou quoi a endommagé la clé.
914.superman = Une tenue de classe D a été retrouvé dans [DONNÉE EXPURGÉ]. Après une examination approfondie, la tenue est rempli d'une substance poudreuse bleu de 12,5 kilogrammes. Une analyse chimique de la substance reste non-concluante. Possiblement en lien avec SCP-914.
939 = "Tous les quatres (4) specimens échapés de SCP-914 ont capturé et reconfiné avec succès. Trois (3) d'entre eux ont fait un peu de bazare dans la Zone de Stockage 6. Une équipe de nettoyage sont intervenues."
1025.cardiacarrest = "Il est mort d'un arrêt cardiaque après avoir lû SCP-1025, c'est sûre. Est-ce que un arrêt cardiaque psychosomatique existe bel et bien, ou SCP-1025 a une propriété anormale qu'on n'est pas en courant ?"
1123 = Le sujet D-9341 a été tué après avoir essayé d'attaquer un membre des Renards à Neuf-Queues. Les archives de vidéos de surveillances ont montré que le sujet s'est baladé autour du site pendant 9 minutes auparavant, hurlant la phrase "éliminer les 4 pestes" en chinois. SCP-1123 a été retrouvé autour de [EXPURGÉ], suggérant que le sujet a fait un contact physique. Le fait que comment SCP-1123 a été retiré de sa chambre de confinement reste inconnu.
1048a = Un corps décédé couvert d'oreilles a été retrouvé dans [EXPURGÉ]. Le subjet a été possiblement attaqué par une instance de SCP-1048-A et a suffoqué à mort à cause des oreilles. Le corps est envoyé pour autopsie.
1162 = Un sujet mort de classe D a été découvert à l'intérieur de la chambre de confinement de SCP-1162. Une autopsie a révélé que son poumon droit avait disparu, suggérant qu'il y ait intéraction avec SCP-1162.
1499 = On ignore où se trouve SCP-1499, mais une équipe de reconaissance a été déployé pour enquêter des rapports sur des attaques violentes dans une église dans le village russe de [EXPURGÉ].
14991 = Un male non identifié et un sujet de classe D ont été découvert dans [EXPURGÉ] par les Renards à Neuf-Queues. L'homme est décrit comme hautement agité et semble parler que la langue russe. Il est pris temporairement dans une zone de détention dand [EXPURGÉ] en attendant d'un traducteur d'arriver.
14991.dimension = Tous le personnel se situant dans l'Abri d'Évacuation LC-2 pendant la brèche ont été administré d'une amnestique de classe B en raison de l'Incident 1499-E. Le sujet de classe D impliqué dans l'incident est mort rapidement après avoir été tiré dessus par l'agent [EXPURGÉ].
guard.intro = Sujet D-9341. Cause de décès: Blessure par balle à la tête. Les archives de surveillance ont confirmé que le sujet a été éliminé par l'Agent Ulgrin rapidement après le début du confinement du site.
guard.gate.b = "Agent G. vers centre de contrôle. J'ai éliminé un classe D fugitif dans la cour du Gate B."
apache = "CH-2 vers centre de contrôle. Abattu une classe D en fuite à {0}."
apache.gate.a = Gate A
apache.gate.b = Gate B
ntf = Sujet D-9341. Éliminé par les Renards à Neuf-Queues.
ntf.bloodloss = Sujet D-9341. Mort d'hémorragie après avoir été par tiré dessus par les Renards à Neuf-Queues."
tesla = Le sujet D-9341 a été tué par la porte Tesla à [EXPURGÉ].
killbat = Le sujet D-9341 a été retrouvé mort à l'intérieur du compartiement de sortie de SCP-914, à côté de ce qui semble être une pile de 9 volts ordinaire. Le sujet présente de graves brûlures électriques et serait mort d'un choc électrique causé par la pile. La pile a été conservée pour une étude plus approfondie.
suicide_1 = [EXPURGÉ]
suicide_2 = Le sujet D-9341 est retrouvé mort dans [EXPURGÉ]. Le sujet ne semble pas avoir subi de dommages physiques et rien n'indique clairement ce qui l'a tué. Le corps a été envoyé pour autopsie.
suicide_3 = EXCP_ACCESS_VIOLATION
suicide_4 = Le sujet D-9341 est retrouvé mort dans [EXPURGÉ]. Le sujet semble avoir griffonné les lettres 'VTP' avec son propre sang à côté de lui. Aucun autre signe de traumatisme physique ou de lutte n'a été observé. Le corps a été envoyé pour autopsie.
gassed = Le sujet D-9341 est retrouvé mort dans [EXPURGÉ]. Cause de décès: Suffocation à cause du gaz de décontamination.

