firstaid.use.5 = Les blessures sont trop graves pour arrêter complètement le saignement.
finefirstaid.use.1 = Vous avez bandé les blessures et pris un anti-douleur. Vous vous sentez mieux.
finefirstaid.use.2 = Vous avez bandé les blessures et pris un anti-douleur, mais vous n'avez pas réussi à arrêter le saignement.
finefirstaid.use.3 = Vous avez bandé les blessures et pris un anti-douleur, mais vous ressentez encore la douleur.
bluefirstaid.use.superman = Vous êtes submergédadRENALINEOHBORDELDEMERDEOUAIIIIIIIIIIIIIIIIIIIIIIIS~ !
bluefirstaid.use.invert = Vous avez soudainement beaucoup de mal à tourner la tête.
bluefirstaid.use.nausea = Vous avez la nausée.
bluefirstaid.use.heal = Vous bandez les blessures. Le saignement s'est arrêté complétement ou vous sentez mieux.
bluefirstaid.use.hurt = Vous bandez les blessures et le sang coule abondanément à travers les bandages.
veryfinefirstaid.use.fullheal = Vos blessures se soignent rapidement.
veryfinefirstaid.use.hurt = Vous commencez à saigner lourdement.
veryfinefirstaid.use.heal = Vous vous sentez mieux.
veryfinefirstaid.use.nausea = Vous avez la nausée.
veryfinefirstaid.use.pocketdimension = Pour une raison inexplicable, vous vous retrouvez dans la dimension de poche.
