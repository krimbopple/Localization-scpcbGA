[Option Tooltip]
; Graphics
vsync = "Synchronisation verticale" Attend que l’affichage termine son cycle de rafraîchissement actuel avant de calculer et d’afficher la prochaine image, évitant ainsi des problèmes tels que le déchirement d'écran. Cela synchronise le nombre de FPS du jeu avec le taux de rafraîchissement de l’écran et peut entraîner une légère latence d’entrée.
antialias = "Anti-Crénelage" est utilisé pour lisser les images rendus avant de les afficher afin de réduire le crénelage sur les contours des bordures des modèles.
gamma = "Correction lumineuse" est utilisé afin d'obtenir un bon facteur de luminosité pour contrebalencer la luminosité de l'écran si le jeu apparaît trop sombre ou trop lumineux. Le paramétrer trop bas ou trop haut pourrait faire paraître les graphismes moins détaillés.
texlod = "Biais de texture LOD" affecte la distance à laquelle les détails des textures changent afin d'éviter le crénelage. Changez cette option si les textures clignotent ou semblent trop floues.
vram = Les textures qui sont stockées dans la RAM-Vidéo chargeront plus vite, mais cela a aussi un effect négatif sur la qualité par conséquent.
hudoffset = "Décalage de l'interface" est utilisé afin de décaler l'indicateur de stamina et l'indicateur de clignement, ainsi que l'affichage général d'objets vers le centre de l'écran. Principalement destiné à l'usage avec des écrans larges.
fov = "Champ de vision" (FOV) correspond à la portion du jeu affichée à l’écran durant la partie.

; Audio
musicvol = Ajuste le volume de la musique de fond. Ajuster la barre tout à gauche coupera toute la musique.
sfxautorelease = "Libération auto du son" libéra un son de la mémoire s'il n'est pas utilisé dans les 5 secondes. Évite les soucis d'allocation à la mémoire.
usertrack = Bascule la possibilité de jouer des pistes personalisées sur le canal 1 de la radio. Ces pistes sont chargés du dossier  "SFX\Radio\UserTracks\". Appuyer sur "1" avec la radio sélectionnée afin de changer la piste.
usertrackmode = Détermine le mode de lecture pour les pistes personalisées. "Répetition" joue chaque fichier dans l'ordre alphabétique. "Aléatoire" choisi la prochaine piste de façon aléatoire.
usertrackmode.note = Il est à noter que le mode aléatoire n'empêche pas les piste précedemment jouées de se répéter.

; Controls
mousesensitivty = Ajuste la vitesse du pointeur de souris.
mousesmoothing = Ajuste le niveau du lissage du pointeur de souris.
binds = Configurer les commandes du jeu.

; Advanced
showhud = Afficher le niveau de clignement et de stamina.
console = Active ou désactive l'utilisation du console dev. Pour l'utiliser, appuyez sur {0}.
console.note = Utiliser la console désactive les succès Steam.
speedrunmode = Montre un timer et change comment le temps de jeu est suivi afin de se conformer aux exigences du speedrun.
numericseeds = Permet au seed d'être entré sous formes d'entier, qui est utilisé directement pour le générateur de nombres aléatoires interne du jeu. Quand aucun seed n'est entré, les millisecondes écoulées depuis le démarrage de l'ordinateur seront utilisées.
achpopup = Affiche une notification pop-up quand un succès est débloqué.
launcher = Autorise le réactivation du launcher si ceci a été déactivé.
showfps = Affiche le compteur d'images par secondes (FPS) au coin du haut à gauche.
framelimit = Limite le nombre d'images par secondes (FPS) à une valeur souhaitée.
framelimit.note = Souvent, 60 FPS ou plus est recommendé. Si vous remarquez des saccades excessives avec ce paramètre, essayez de le baisser pour rendre votre FPS plus consistante.

