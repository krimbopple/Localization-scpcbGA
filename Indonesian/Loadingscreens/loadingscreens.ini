[Mobile Task Forces]
image path = mtf.jpg
align x = center
align y = center
text1 = MTF adalah tim kecil (biasanya sepuluh hingga dua puluh personel, meskipun kelompok dengan lebih dari 50 personel bukanlah hal yang tidak pernah terjadi) yang mengkhususkan diri dalam peran tertentu atau menanggapi situasi tertentu.
text2 = Satuan Tugas Mobile E-11 ("Nine Tailed Fox") adalah Satuan Tugas yang terlatih secara intensif yang mengkhususkan diri dalam perlindungan dan penahanan kembali item SCP yang disimpan di Situs-[REDACTED].
text3 = Tugas mereka termasuk menangani pelanggaran penahanan dengan menahan kembali semua instance SCP aktif dan bermusuhan, menyelamatkan personel Yayasan yang selamat, dan melenyapkan personel Kelas-D yang nakal.

[Night Vision Goggles]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = Kacamata penglihatan malam standar diberikan kepada unit MTF jika terjadi pemadaman listrik.
text2 = Para ilmuwan juga diberikan kacamata tersebut, tetapi disarankan untuk fokus pada evakuasi saat terjadi pemadaman listrik.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 ditemukan oleh Arkeolog K.M. Sandoval selama penggalian sebuah makam di Italia utara. Objek tersebut, sebuah partitur musik tulisan tangan berjudul "Di Gunung Golgota", tampaknya tidak lengkap.
text2 = Tinta merah/hitam, yang awalnya diduga sebagai sejenis tinta pewarna beri atau alami, kemudian diketahui sebagai darah manusia dari beberapa subjek.
text3 = Beberapa subjek uji telah diizinkan mengakses partitur tersebut. Dalam setiap kasus, subjek tersebut melukai diri sendiri untuk menggunakan darah mereka sendiri guna menyelesaikan karya tersebut, yang mengakibatkan gejala psikosis dan trauma berat.

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 tampak seperti topeng komedi porselen putih, meskipun, kadang-kadang, ia akan berubah menjadi tragedi.
text2 = Ketika SCP-035 diletakkan di wajah seseorang, pola gelombang otak alternatif dari SCP-035 tumpang tindih dengan pola gelombang otak inang aslinya, secara efektif memadamkannya dan menyebabkan kematian otak pada subjek. Subjek kemudian mengklaim sebagai kesadaran yang terkandung dalam SCP-035.
text3 = Analisis psikologis telah menemukan bahwa SCP-035 memiliki sifat yang sangat manipulatif, mampu memaksa perubahan mendadak dan mendalam pada keadaan psikologis pewawancara. SCP-035 telah terbukti sangat sadis, mendorong beberapa orang untuk bunuh diri hanya dengan bujukan linguistik.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = SCP-049 berpenampilan humanoid; namun, Yayasan saat ini tidak mampu mempelajari wajah dan tubuhnya lebih lengkap, karena tertutup oleh apa yang tampak seperti pakaian Dokter Wabah tradisional dari Eropa abad ke-15-16.
text2 = Sentuhan SCP-049 selalu mematikan bagi manusia. Setelah kontak dengan tangan SCP-049, korban (selanjutnya disebut sebagai SCP-049-2) menderita [DATA EXPUNGED] dan meninggal dalam beberapa saat.
text3 = SCP-049 kemudian mengeluarkan tas yang terbuat dari [DATA EXPUNGED] berisi pisau bedah, jarum, benang, dan beberapa botol zat yang belum teridentifikasi dan mulai membedah SCP-049-2, serta memasukkan berbagai bahan kimia ke dalam tubuhnya.
teks4 = Setelah sekitar 20 menit, SCP-049 akan menjahit kembali SCP-049-2 dan menjadi jinak sekali lagi. Setelah beberapa menit, SCP-049-2 akan kembali menunjukkan tanda-tanda kehidupan dan tampak hidup kembali.

[SCP-066]
image path = 066.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-066 adalah massa amorf berupa benang yang terjalin rumit dengan berat sekitar satu kilogram.
text2 = Setelah Insiden 066-2 (lihat Laporan Insiden 066-2), SCP-066 mulai menunjukkan perilaku yang sangat tidak konsisten dengan sifat-sifatnya sebelumnya.
text3 = SCP-066 sekarang menunjukkan mobilitas yang signifikan, dan akan menghasilkan suara dan efek anomali di hadapan manusia mana pun, terlepas dari apakah manusia tersebut berinteraksi dengan SCP-066 atau tidak.

[SCP-079]
image path = 079.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-079 adalah Exidy Sorcerer Mikrokomputer yang dibangun pada tahun 1978.
text2 = Tidak diketahui kapan SCP-079 memperoleh kesadaran, tetapi diketahui bahwa perangkat lunaknya telah berevolusi hingga pada titik di mana perangkat kerasnya seharusnya tidak mampu menanganinya, bahkan di ranah fantasi.
text3 = Ia telah lulus uji Turing, dan cukup banyak bicara, meskipun nadanya sangat kasar dan penuh kebencian. Ia juga menunjukkan keinginan jahat untuk melarikan diri.

[SCP-096]
image path = 096.png
align x = right
align y = bottom
disablebackground = true
text1 = SCP-096 biasanya sangat jinak, dengan sensor tekanan di dalam selnya menunjukkan bahwa ia menghabiskan sebagian besar waktunya mondar-mandir di dekat dinding timur.
text2 = Namun, ketika seseorang melihat wajah SCP-096, baik secara langsung, melalui rekaman video, atau bahkan foto, ia akan memasuki tahap tekanan emosional yang cukup besar.
text3 = Kira-kira satu hingga dua menit setelah penglihatan pertama, SCP-096 akan mulai berlari ke arah orang yang melihat wajahnya.

[SCP-106]
image path = 106.jpg
align x = right
align y = bottom
text1 = SCP-106 tampak seperti humanoid tua, dengan penampilan umum pembusukan tingkat lanjut. Penampilan ini mungkin bervariasi, tetapi kualitas "pembusukan" diamati pada semua bentuknya.
text2 = SCP-106 menyebabkan efek "korosi" pada semua materi padat yang disentuhnya, menyebabkan kerusakan fisik pada material beberapa detik setelah kontak. Hal ini diamati sebagai karat, pembusukan, dan retak pada material, serta terciptanya zat hitam seperti lendir yang mirip dengan lapisan material yang melapisi SCP-106.
text3 = SCP-106 dapat menembus materi padat dan akan menangkap serta membunuh mangsanya dengan menariknya ke dalam apa yang dianggap sebagai "pocket dimension" pribadinya.

[SCP-173]
image path = 173.jpg
align x = left
align y = bottom
text1 = SCP-173 terbuat dari beton dan besi beton dengan jejak cat semprot merek Krylon. Benda ini hidup dan sangat agresif.
text2 = Benda ini tidak dapat bergerak selama berada dalam garis pandang langsung. Garis pandang tidak boleh terputus kapan pun dengan SCP-173. Personel yang ditugaskan untuk memasuki kontainer diinstruksikan untuk saling mengingatkan sebelum berkedip.

[SCP-205]
image path = 205.jpg
align x = right
align y = bottom
disablebackground = true
text1 = SCP-205 adalah sepasang lampu sorot yang digunakan dalam fotografi. Cahaya yang dipancarkan oleh setiap lampu berperilaku unik untuk SCP-205 dan menembus sepenuhnya permukaan apa pun yang tidak berwarna putih.
text2 = Jika cahaya terus berlanjut tanpa terputus melalui materi apa pun, dan tidak menimbulkan bayangan, setiap lampu akan menampilkan bayangan seorang wanita muda yang tidak dikenal pada permukaan putih datar apa pun, seperti layar proyeksi di Ruang 52.

[SCP-294]
image path = 294.jpg
align x = center
align y = bottom
disablebackground = true
text1 = Item SCP-294 tampak seperti mesin penjual kopi standar, satu-satunya perbedaan yang terlihat adalah papan sentuh input dengan tombol yang sesuai dengan keyboard QWERTY bahasa Inggris.
text2 = Setelah memasukkan nama cairan apa pun menggunakan papan sentuh, cangkir minum kertas standar berukuran 12 ons akan diletakkan dan cairan yang ditunjukkan akan dituangkan.
text3 = Sembilan puluh tujuh uji coba awal dilakukan (termasuk permintaan air, kopi, bir, dan soda, cairan yang tidak dapat dikonsumsi seperti asam sulfat, cairan pembersih kaca, dan oli mesin, serta zat yang biasanya tidak ada dalam keadaan cair, seperti nitrogen, besi, dan kaca) dan masing-masing menghasilkan keberhasilan.

[SCP-372]
image path = 372.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-372 adalah makhluk dari genus yang tidak diketahui, panjangnya sekitar 6,5 kaki dari kepala hingga ekor dan beratnya sekitar 99,2 pon. Ia memiliki tubuh yang panjang dan tipis dengan delapan pasang anggota tubuh yang sempit.
text2 = SCP-372 telah belajar memprediksi pergerakan makhluk apa pun di sekitarnya, dan menggunakan teknik ini untuk bersembunyi di balik kepala seseorang yang mencarinya, atau di titik buta mereka.
text3 = Jika terjadi pelanggaran penahanan, semua personel disarankan untuk melaporkan setiap gerakan berkedip singkat di sudut mata mereka.

[SCP-427]
image path = 427.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-427 adalah liontin kecil berbentuk bola, berukir indah, terbuat dari bahan perak yang dipoles. Ukiran-ukiran indah tersebut tampaknya tidak memiliki fungsi apa pun.
text2 = SCP-427 diciptakan setelah menempatkan pil SCP-500 di bilik Input SCP-914 dan menggunakan pengaturan Halus. Ia tidak menunjukkan aktivitas yang tidak biasa saat tertutup. Ketika SCP-427 dibuka dan terpapar jaringan biologis, ia dengan cepat meregenerasi kerusakan sel dan entah bagaimana mampu membersihkan senyawa atau infeksi yang menyerang.
text3 = Namun, paparan jangka panjang menimbulkan bahaya kesehatan yang signifikan. Saat liontin menyembuhkan kerusakan, ia mengoptimalkan sistem alami tubuh. Personel Kelas-D yang terpapar perangkat tersebut selama lebih dari satu jam mulai bermutasi menjadi massa jaringan yang tidak berbentuk.
teks4 = "Binatang Daging" yang diciptakan oleh SCP-427 sangat agresif, menyerang semua personel yang terlihat dengan hasil yang mematikan. Mereka sangat tahan terhadap sebagian besar senjata yang dikenal.

[SCP-500]
image path = 500.jpg
align x = right
align y = bottom
text1 = SCP-500 adalah kaleng plastik kecil yang pada saat penulisan ini berisi empat puluh tujuh (47) pil merah.
text2 = Satu pil, bila diminum secara oral, secara efektif menyembuhkan subjek dari semua penyakit dalam waktu dua jam, waktu tepatnya tergantung pada tingkat keparahan dan jumlah kondisi subjek.
text3 = Meskipun telah dilakukan uji coba ekstensif, semua upaya untuk mensintesis lebih banyak zat yang dianggap sebagai bahan aktif pil tersebut belum berhasil.

[SCP-513]
image path = 513.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-513 adalah lonceng sapi berkarat yang biasa saja. Tidak ada tanda atau ukiran yang terlihat di permukaannya karena korosi yang sangat parah.
text2 = Kira-kira satu jam setelah terpapar suara apa pun yang dihasilkan oleh SCP-513, korban paparan mulai melihat sekilas entitas yang disebut sebagai SCP-513-1.
text3 = Semua interogasi sejauh ini menunjukkan bahwa SCP-513-1 adalah humanoid tinggi dan kurus dengan tangan yang luar biasa besar.

[SCP-682]
image path = 682.jpg
align x = right
align y = bottom
text1 = SCP-682 adalah makhluk besar yang samar-samar menyerupai reptil, asal-usulnya tidak diketahui. Ia tampaknya membenci semua kehidupan, yang telah diungkapkan dalam beberapa wawancara selama penahanan.
text2 = SCP-682 selalu diamati memiliki kekuatan, kecepatan, dan refleks yang sangat tinggi, meskipun tingkat pastinya bervariasi tergantung bentuknya. Kemampuan regenerasi dan ketahanan SCP-682 sangat mencengangkan, dan ia telah terlihat bergerak dan berbicara meskipun tubuhnya 87% hancur atau membusuk.
text3 = SCP-682 harus dihancurkan sesegera mungkin.

[SCP-714]
image path = 714.jpg
align x = center
align y = center
disablebackground = true
Teks 1 = SCP-714, yang tampaknya tidak lebih dari cincin giok hijau, telah terbukti mampu mengembang dan menyusut untuk menyesuaikan diri dengan sempurna dengan jari siapa pun yang menyentuhnya, meskipun ini adalah sifat yang paling tidak penting.
Teks 2 = Memakai SCP-714 memiliki beberapa efek utama, termasuk kelelahan, dorongan untuk beristirahat/tidur, reaksi yang lebih lambat, dan penurunan kapasitas mental.
Teks 3 = Pemakai SCP-714 menunjukkan peningkatan toleransi terhadap berbagai bahan kimia dan ketahanan yang sangat tinggi terhadap pengaruh memetik dan mental.

[SCP-860]
image path = 860.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-860 adalah kunci berwarna biru tua dengan bentuk yang biasa saja.
text2 = Pada interval waktu yang tampaknya acak, serangkaian angka akan muncul di bilah kunci. Angka-angka ini kemudian diketahui sebagai koordinat UTM.
text3 = SCP-860 dapat masuk dan membuka kunci pintu tradisional apa pun yang membutuhkan kunci yang terletak di area koordinat yang diberikan.
teks4 = Ketika SCP-860 digunakan untuk membuka pintu, pintu tersebut tidak mengarah ke tujuan biasanya. Sebaliknya, pintu tersebut terbuka ke sebuah lahan terbuka kecil di hutan, yang selanjutnya disebut sebagai SCP-860-1.

[SCP-895]
image path = 895.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-895 adalah peti mati kayu ek berornamen yang ditemukan dari Kamar Mayat [DIREDAKSI].
text2 = SCP-895 menyebabkan gangguan pada peralatan pengawasan video dan fotografi dalam jarak 50 meter, mirip dengan halusinasi yang jelas dan mengganggu dengan durasi dan keteraturan yang bervariasi sesuai dengan kedekatan kamera dengan SCP-895.
text3 = Dalam jarak 5 meter dari SCP-895, rekaman yang diambil dapat menyebabkan trauma psikologis dan histeria yang parah pada sebagian besar subjek.

[SCP-914]
image path = 914.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-914 adalah perangkat mekanik besar yang beratnya beberapa ton dan meliputi area seluas delapan belas meter persegi, terdiri dari penggerak sekrup, sabuk, katrol, roda gigi, pegas, dan mekanik lainnya.
text2 = Ketika suatu objek ditempatkan di Ruang Penerimaan dan kuncinya diputar, SCP-914 akan "memurnikan" objek tersebut. Tidak ada energi yang hilang dalam proses ini, dan objek tersebut dimurnikan berdasarkan pengaturan yang ditentukan pada panel depan 914.
text3 = Tidak ada materi organik yang boleh dimasukkan ke dalam SCP-914 kapan pun.

[SCP-939]
image path = 939.jpg
align x = left
align y = top
disablebackground = true
text1 = SCP-939 adalah predator endotermik yang hidup berkelompok dan menunjukkan atrofi berbagai sistem yang mirip dengan organisme troglobitik. SCP-939 rata-rata memiliki tinggi 2,2 meter saat berdiri tegak dan berat rata-rata 250 kg, meskipun beratnya sangat bervariasi.
text2 = Metode utama SCP-939 untuk memikat mangsa adalah dengan meniru ucapan manusia dengan suara korban sebelumnya, meskipun peniruan spesies lain dan perburuan nokturnal aktif telah didokumentasikan.
text3 = Mangsa biasanya dibunuh dengan satu gigitan ke tengkorak atau leher; kekuatan gigitan telah diukur melebihi 35 MPa.


[SCP-966]
image path = 966.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-966 hanya terlihat pada panjang gelombang mulai dari 700 nm hingga sekitar 900 nm. Ini berlaku untuk semua jaringan SCP-966, terlepas dari keadaan mereka saat ini.
text2 = Metode berburu mereka terdiri dari memancarkan satu semburan gelombang jenis yang sebelumnya tidak dikenal, yang secara permanen menghambat kemampuan makhluk yang terpengaruh untuk memasuki salah satu tahap tidur NREM dan REM. Kemampuan untuk tidur mikro juga hilang.
text3 = Setelah merampas tidur korbannya, SCP-966 akan menguntit mangsanya sampai kurangnya istirahat membuatnya tidak berdaya. Pada titik ini, SCP-966 akan memakannya.

[SCP-970]
image path = 970.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-970 adalah fenomena spasial di mana sekumpulan ruangan melingkar pada dirinya sendiri. Dalam semua kasus yang ditemukan, ini terjadi melalui serangkaian pintu yang muncul di dinding, semuanya dalam garis lurus, sehingga memungkinkan untuk berjalan maju dan berakhir di posisi awal.
text2 = Perubahan pada ruangan tidak memengaruhi ruangan dan lantai yang berdekatan. Hingga saat ini belum ada penjelasan yang diketahui untuk munculnya fenomena ini.
text3 = Sejak penemuan pertama fenomena SCP-970, contoh-contoh lain dari fenomena tersebut telah ditemukan, dengan [DATA DIHAPUS]% di antaranya berada dalam radius 800 kilometer dari Sektor 19.

[SCP-1025]
image path = 1025.jpg
align x = right
align y = bottom
text1 = SCP-1025 adalah buku bersampul keras, dengan panjang sekitar 1.500 halaman. Sampul depan dan punggung buku menampilkan judul "The Encyclopedia of Common Disease.
text2 = Tidak ada salinan lain dari buku dengan judul dan penerbit tersebut yang ditemukan, dan tidak ada catatan tentang penerbitnya.
text3 = Pembaca buku ini tampaknya menunjukkan gejala penyakit apa pun yang mereka baca. Efeknya dapat membutuhkan waktu antara _ dan __ jam untuk muncul.

[SCP-1123]
image path = 1123.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1123 adalah tengkorak manusia yang kehilangan rahang bawah dan semua giginya. Di sepanjang sisi luar squama frontalis terdapat tulisan Khmer modern, yang ditulis dengan darah manusia, yang diterjemahkan sebagai "Ingatlah".
text2 = Pengujian genetik mengkonfirmasi bahwa tengkorak dan darah tersebut berasal dari individu yang sama. Tulisan Khmer tersebut sangat pudar, dan tidak terlihat oleh sebagian besar subjek di luar jarak 5 meter.
text3 = Subjek yang berada pada jarak 1 meter atau kurang dari objek akan melaporkan bahwa darah tersebut masih segar, seolah-olah "masih basah", serta fenomena sensorik anomali lainnya, termasuk bau, suara, dan respons taktil.

[SCP-1162]
image path = 1162.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1162 saat ini berupa lubang di dinding bata di Situs-[DATA DIHAPUS].
text2 = SCP-1162 diaktifkan ketika makhluk berakal menjangkau ke dalam lubang, di mana jari-jari mereka menyentuh permukaan padat yang mirip dengan lokasi SCP-1162 saat ini, dan mereka menemukan benda yang cukup kecil untuk masuk melalui lubang tersebut.
text3 = Benda-benda ini secara umum telah dikenali sebagai sesuatu yang telah hilang oleh pengguna, atau yang dicari pengguna di suatu titik dalam hidup mereka.

[SCP-1499]
image path = 1499.jpg
align x = right
align y = bottom
disablebackground = true 
text1 = SCP-1499 adalah masker gas Soviet GP-5. Uji penyegelan yang dilakukan pada objek tersebut menunjukkan bahwa objek tersebut mempertahankan fungsi aslinya.
text2 = Efek anomali SCP-1499 aktif ketika manusia meletakkan SCP-1499 di kepala mereka. Kira-kira satu detik setelah SCP-1499 terpasang sepenuhnya di kepala subjek, subjek tersebut menghilang dari pandangan, dan tidak lagi terdeteksi.
text3 = Setelah mengenakan SCP-1499, subjek uji melaporkan lingkungan yang sama sekali berbeda dari sebelum mereka mengenakan SCP-1499.

[The Chaos Insurgency]
image path = chaos.jpg
align x = left
align y = bottom
disablebackground = true
text1 = Chaos Insurgency adalah kelompok sempalan dari Foundation, yang dibentuk oleh sel pemberontak yang melarikan diri dengan beberapa SCP yang sangat berguna pada tahun 1924.
text2 = Markas utama operasi Insurgency tidak diketahui, begitu pula para pemimpinnya. Organisasi ini secara langsung bermusuhan dengan Foundation, dan beberapa kali berkonflik memperebutkan SCP.
text3 = Personel diwajibkan untuk waspada terhadap kemungkinan serangan, upaya teroris, dan mata-mata dari Insurgency, dan untuk memberi tahu komando tentang perilaku aneh dari sesama personel.

[Class-D Personnel]
image path = classd.jpg
align x = right
align y = bottom
text1 = Personel Kelas-D adalah staf yang ditunjuk untuk menangani objek tingkat Keter.
text2 = Personel Kelas-D direkrut dari narapidana. Orang yang dihukum mati lebih diutamakan; dalam keadaan darurat, Protokol 12 dapat diizinkan, memungkinkan perekrutan orang yang tidak bersalah atau orang yang dipenjara karena kejahatan yang lebih ringan.
text3 = Semua personel Kelas-D harus diberhentikan pada tanggal satu setiap bulan, dan staf baru harus siap untuk menggantikan mereka.

