[The SCP Foundation]
image path = foundationlogo.jpg
align x = left
align y = top
text1 = SCP Foundatiom adalah organisasi yang didedikasikan untuk penahanan dan penelitian artefak dan bentuk kehidupan anomali.
text2 = "SCP" adalah singkatan dari "Prosedur Penahanan Khusus" (dan motto resmi yayasan, "Amankan, Tahan, Lindungi.") - yang merangkum tujuan dan metode tindakan Yayasan.