[Option Tooltip]
; Grafik
vsync = "V-Sync" menunggu layar menyelesaikan siklus penyegaran saat ini sebelum menghitung frame berikutnya, mencegah masalah seperti screen tearing (gambar pecah). Ini mengaitkan frame rate game dengan refresh rate layar Kamu dan dapat menyebabkan lag input.
antialias = "Anti-Aliasing" digunakan untuk menghaluskan gambar yang dirender sebelum ditampilkan guna mengurangi aliasing di sekitar tepi model.
gamma = "Koreksi gamma" digunakan untuk mencapai faktor kecerahan yang baik guna menyeimbangkan gamma tampilan Kamu jika gim tampak terlalu gelap atau terlalu terang. Mengaturnya terlalu tinggi atau terlalu rendah dapat menyebabkan grafis terlihat kurang detail.
texlod = "Texture LOD Bias" memengaruhi jarak di mana detail tekstur akan berubah untuk mencegah aliasing. Ubah opsi ini jika tekstur berkedip atau terlihat terlalu buram.
vram = Tekstur yang tersimpan di Video-RAM akan dimuat lebih cepat, tetapi hal ini juga berdampak negatif pada kualitas tekstur.
hudoffset = "HUD offset" digunakan untuk menggeser meteran stamina dan blink, serta tampilan informasi berbagai item ke arah tengah layar. Terutama ditujukan untuk penggunaan dengan monitor ultrawide.
fov = "Field of view" (FOV) adalah luas area permainan yang ditampilkan selama permainan berlangsung.

; Audio
musicvol = 
Mengatur volume musik latar. Menggeser sepenuhnya ke kiri akan membisukan semua musik.
soundvol = Mengatur volume efek suara. Menggeser bilah sepenuhnya ke kiri akan membisukan semua suara.
sfxautorelease = "Pelepasan suara otomatis" akan membebaskan suara dari memori jika tidak digunakan setelah 5 detik. Mencegah masalah alokasi memori.
usertrack = Mengaktifkan atau menonaktifkan pemutaran lagu kustom di saluran 1 radio. Lagu-lagu ini dimuat dari direktori "SFX\Radio\UserTracks\". Tekan "1" saat radio dipilih untuk mengganti lagu.
usertrackmode = Mengatur mode pemutaran untuk trek kustom. "Ulangi" memutar setiap file secara alfabetis. "Acak" memilih trek berikutnya secara acak.
usertrackmode.note = Catatatn : mode acak tidak mencegah lagu yang sebelumnya diputar untuk diputar ulang.
usertrackscan = Memeriksa ulang direktori trek pengguna untuk file suara baru atau yang dihapus.

; Controls
mousesensitivty = Mengatur kecepatan kursor mouse.
mousesmoothing = Mengatur tingkat kehalusan kursor mouse.
binds = Konfigurasikan skema kontrol dalam game.

; Advanced
showhud = Tampilkan indikator kedipan mata dan stamina.
console = Mengaktifkan atau menonaktifkan penggunaan konsol pengembang. Dapat digunakan dalam game dengan menekan {0}.
console.note = Menggunakan konsol akan menonaktifkan pencapaian Steam.
speedrunmode = Menampilkan penghitung waktu dan mengubah cara pelacakan waktu bermain agar sesuai dengan persyaratan speedrunning.
numericseeds = Memungkinkan nilai awal (seed) dimasukkan sebagai bilangan bulat, yang akan digunakan untuk langsung memberi nilai awal pada generator angka acak internal game. Jika tidak ada nilai awal yang dimasukkan, maka waktu yang telah berlalu dalam milidetik sejak komputer dimulai akan digunakan.
achpopup = Menampilkan notifikasi pop-up saat sebuah pencapaian berhasil diraih.
launcher = Memungkinkan pengaktifan kembali peluncur jika telah dinonaktifkan.
showfps = Menampilkan penghitung frame per detik di pojok kiri atas.
framelimit = Membatasi frame rate yang dapat dijalankan game ke nilai yang diinginkan.
framelimit.note = Biasanya, 60 FPS atau lebih tinggi lebih disukai. Jika Kamu mengalami lag yang berlebihan pada pengaturan ini, coba turunkan agar frame rate Kamu lebih konsisten.

