[Death Message]
008 = Subjek D-9341 ditemukan sedang menelan Dr. [REDACTED] di Sektor [REDACTED]. Subjek segera dihabisi oleh Nine-Tailed Fox dan dikirim untuk otopsi. Infeksi SCP-008 dikonfirmasi, setelah itu tubuhnya dibakar.
008.gate = Subjek D-9341 ditemukan berkeliaran di sekitar {0}. Subjek segera dihabisi oleh Nine-Tailed Fox dan dikirim untuk otopsi. Infeksi SCP-008 dikonfirmasi, setelah itu tubuhnya dibakar.
008.gate.a = Gate A
008.gate.b = Gate B
008zombie = Subjek D-9341. Penyebab kematian: beberapa luka robek dan trauma tumpul parah yang disebabkan oleh [REDACTED], yang terinfeksi SCP-008. Subjek tersebut ditemukan oleh Nine-Tailed Fox dan dihabisi.
012 = Subjek D-9341 ditemukan dalam genangan darah di sebelah SCP-012. Subjek tampaknya telah merobek pergelangan tangannya dan menulis tiga baris tambahan pada komposisi tersebut sebelum meninggal karena kehilangan banyak darah.
035.chamber = Subjek Kelas D D-9341 ditemukan tewas di dalam ruang penahanan SCP-035. Subjek menunjukkan pendarahan hebat pada pembuluh darah di sekitar mata dan di dalam mulut dan hidung. Dikirim untuk otopsi.
035.tentacle = "Kita akan membutuhkan lebih dari tim pembersih biasa untuk menangani ini. Dua tonjolan besar dan sangat aktif seperti tentakel tampaknya telah terbentuk di dalam ruangan. Tingkat agresivitas mereka tidak seperti yang pernah kita lihat sebelumnya - sepertinya mereka telah memukuli seseorang dari Kelas D yang malang hingga tewas pada suatu saat selama pelanggaran."
035.tentacle.office = "Satu tonjolan besar dan sangat aktif seperti tentakel tampaknya telah tumbuh di luar mayat seorang ilmuwan di area kantor [REDACTED]. Tingkat agresivitasnya tidak seperti yang pernah kita lihat sebelumnya - sepertinya ia telah memukuli seseorang dari Kelas D yang malang hingga tewas pada suatu saat selama pelanggaran."
049 = Satu contoh aktif SCP-049-2 ditemukan di [REDACTED]. Dimusnahkan oleh Nine-Tailed Fox.
049.chamber = Tiga (3) contoh aktif SCP-049-2 ditemukan di terowongan di luar ruang penahanan SCP-049. Dimusnahkan oleh Nine-Tailed Fox.
0492 = Subjek D-9341. Penyebab kematian: beberapa luka robek dan trauma tumpul parah yang disebabkan oleh satu contoh SCP-049-2.
096 = Sejumlah besar darah ditemukan di [DATA REDACTED]. DNA diidentifikasi sebagai Subjek D-9341. Kemungkinan besar [DATA REDACTED] oleh SCP-096.
106.pd = Subjek D-9341. Tubuh sebagian terurai oleh apa yang diasumsikan sebagai efek "korosi" SCP-106. Tubuh dibuang melalui pembakaran.
106.pd.crushed = Selain penampilan yang membusuk yang khas dari korban SCP-106, tubuh tersebut menunjukkan cedera yang belum pernah diamati sebelumnya: patah tulang tengkorak yang parah, tiga tulang rusuk patah, patah bahu, dan beberapa luka robek yang berat.
106.pd.fall = Selain penampilan yang membusuk yang khas dari korban SCP-106, subjek tampaknya menderita beberapa patah tulang berat di kedua kakinya.
173 = Subjek D-9341. Penyebab kematian: Patah tulang leher yang fatal. Diduga diserang oleh SCP-173.
173.camera = Subjek D-9341. Penyebab kematian: Patah tulang leher yang fatal. Rekaman pengawasan mengkonfirmasi bahwa subjek dibunuh oleh SCP-173.
173.intro = Subjek D-9341. Penyebab kematian: Patah tulang leher yang fatal. Menurut Kepala Keamanan Franklin yang hadir di ruang penahanan SCP-173 selama pelanggaran tersebut, subjek tersebut dibunuh oleh SCP-173 segera setelah gangguan pada jaringan listrik dimulai.
173.doors = "Jika saya tidak salah, salah satu tujuan utama ruangan-ruangan ini adalah untuk menghentikan SCP-173 bergerak lebih jauh jika terjadi pelanggaran penahanan. Jadi, ide brilian siapa yang memasang SALURAN VENTILASI SEBESAR MANUSIA di sana?"
205 = Siklus SCP-205 tampaknya telah kembali ke jalur normalnya setelah anomali yang diamati selama [REDACTED]. Mayat subjek D-9341 ditemukan di dalam ruangan. Subjek tersebut menunjukkan tanda-tanda trauma akibat benturan benda tumpul yang khas bagi personel yang memasuki ruangan saat lampu dimatikan.
420js = Subjek D-9341 ditemukan dalam keadaan koma di [DATA REDACTED]. Subjek tersebut memegang sesuatu yang tampak seperti rokok sambil tersenyum lebar. Analisis kimia rokok tersebut tidak memberikan kesimpulan yang pasti, meskipun tampaknya mengandung konsentrasi tinggi zat kimia tak dikenal yang struktur molekulnya sangat mirip dengan tetrahidrokanabinol.
427 = "Meminta dukungan dari MTF Nu-7. Kita membutuhkan lebih banyak daya tembak untuk menjatuhkan benda ini."
895 = "Yang kita ketahui adalah dia meninggal karena serangan jantung. Dugaan saya adalah itu disebabkan oleh SCP-895, meskipun belum pernah diamati mempengaruhi peralatan video dari jarak sejauh ini sebelumnya. Pengujian lebih lanjut diperlukan untuk menentukan apakah 'Zona Merah' SCP-895 meningkat."
895.nvg = "Kelas D melihat SCP-895 melalui kacamata penglihatan malam digital, membunuhnya."
895.finenvg = "Kelas D melihat SCP-895 melalui sepasang kacamata penglihatan malam digital, yang diduga ditingkatkan oleh SCP-914. Mungkin saja subjek mampu menahan efek memetik sebagian melalui kacamata ini. Kacamata tersebut telah disimpan untuk penelitian lebih lanjut."
914.rough = "Mayat yang sangat termutilasi ditemukan di dalam bilik keluaran SCP-914. Pengujian DNA mengidentifikasi mayat tersebut sebagai Subjek Kelas D D-9341. Subjek tersebut jelas telah 'dimurnikan' oleh SCP-914 pada pengaturan 'Kasar', tetapi kami masih bingung bagaimana dia berakhir di dalam bilik pemasukan dan siapa atau apa yang memutar kuncinya.
914.superman = Sebuah jumpsuit Kelas D ditemukan di [DATA REDACTED]. Setelah pemeriksaan lebih lanjut, jumpsuit tersebut ditemukan berisi 12,5 kilogram zat seperti abu biru. Analisis kimia zat tersebut masih belum meyakinkan. Kemungkinan besar terkait dengan SCP-914.
939 = "Keempat (4) spesimen SCP-939 yang melarikan diri telah ditangkap dan ditahan kembali dengan sukses. Tiga (3) dari mereka membuat kekacauan di Area Penyimpanan 6. Tim pembersih telah dikirim.
1025.cardiacarrest = "Dia meninggal karena serangan jantung setelah membaca SCP-1025, itu sudah pasti. Apakah ada yang namanya henti jantung psikosomatik, atau apakah SCP-1025 memiliki beberapa sifat anomali yang belum kita ketahui?
1123 = Subjek D-9341 ditembak mati setelah mencoba menyerang anggota Nine-Tailed Fox. Rekaman pengawasan menunjukkan bahwa subjek telah berkeliaran di sekitar lokasi sekitar 9 menit sebelumnya, meneriakkan frasa "singkirkan keempat hama" dalam bahasa Mandarin. SCP-1123 ditemukan di [REDACTED] di dekatnya, menunjukkan bahwa subjek telah melakukan kontak fisik dengannya. Bagaimana tepatnya SCP-1123 dikeluarkan dari ruang penahanannya masih belum diketahui.
1048a = Mayat yang tertutup telinga ditemukan di [REDACTED]. Subjek diduga diserang oleh instance SCP-1048-A dan mati lemas karena telinga. Mayat dikirim untuk otopsi.
1162 = Seorang subjek Kelas D yang tewas ditemukan di dalam ruang penahanan SCP-1162. Otopsi mengungkapkan bahwa paru-paru kanannya hilang, yang menunjukkan adanya interaksi dengan SCP-1162.
1499 = Keberadaan SCP-1499 masih belum diketahui, tetapi tim pengintai telah dikirim untuk menyelidiki laporan serangan kekerasan terhadap sebuah gereja di kota [REDACTED], Rusia.
14991 = Seorang pria tak dikenal dan seorang subjek Kelas D yang telah meninggal ditemukan di [REDACTED] oleh Rubah Ekor Sembilan. Pria itu digambarkan sangat gelisah dan tampaknya hanya berbicara bahasa Rusia. Dia telah dibawa ke area penahanan sementara di [REDACTED] sambil menunggu penerjemah tiba.
14991.dimensi = Semua personel yang berada di dalam Tempat Perlindungan Evakuasi LC-2 selama pelanggaran telah diberikan amnestik Kelas-B karena Insiden 1499-E. Subjek Kelas D yang terlibat dalam peristiwa tersebut meninggal tak lama setelah ditembak oleh Agen [REDACTED].
guard.intro = Subjek D-9341. Penyebab kematian: Luka tembak di kepala. Rekaman pengawasan mengkonfirmasi bahwa subjek tersebut dilenyapkan oleh Agen Ulgrin tak lama setelah penguncian situs dimulai.
guard.gate.b = "Agen G. untuk mengendalikan. Menghilangkan seorang buronan Kelas D di halaman Gerbang B."
apache = "CH-2 untuk mengendalikan. Menembak jatuh buronan Kelas D di {0}."
apache.gate.a = Gerbang A
apache.gate.b = Gerbang B
ntf = Subjek D-9341. Dilenyapkan oleh Rubah Ekor Sembilan.
ntf.bloodloss = Subjek D-9341. Meninggal karena kehilangan darah setelah ditembak oleh Rubah Ekor Sembilan.
tesla = Subjek D-9341 terbunuh oleh gerbang Tesla di [REDACTED].
killbat = Subjek D-9341 ditemukan tewas di dalam bilik keluaran SCP-914 di sebelah apa yang tampak seperti baterai sembilan volt biasa. Subjek tersebut dipenuhi luka bakar listrik yang parah, dan diduga terbunuh melalui sengatan listrik yang disebabkan oleh baterai. Baterai tersebut telah disimpan untuk penelitian lebih lanjut.
suicide_1 = [REDACTED]
suicide_2 = Subjek D-9341 ditemukan tewas di Sektor [REDACTED]. Subjek tampaknya tidak mengalami kerusakan fisik, dan tidak ada indikasi yang terlihat tentang apa yang membunuhnya. Jenazah dikirim untuk otopsi.
suicide_3 = PELANGGARAN AKSES EXCP
suicide_4 = Subjek D-9341 ditemukan tewas di Sektor [REDACTED]. Subjek tampaknya telah menuliskan huruf "kys" dengan darahnya sendiri di sampingnya. Tidak ada tanda-tanda trauma fisik atau perlawanan lain yang dapat diamati. Jenazah dikirim untuk otopsi.
gassed = Subjek D-9341 ditemukan tewas di [DATA REDACTED]. Penyebab kematian: Mati lemas karena gas dekontaminasi.

