[Death Message]
008 = Subjekt D-9341 byl nalezen při požívání Doktora [VYMAZÁNO] v Sektoru [VYMAZÁNO]. Subjekt byl okamžitě terminován Devítiocasou liškou a poslán na pitvu. Infekce SCP-008 byla potvrzena, načež bylo tělo spáleno.
008.gate = Subjekt D-9341 byl nalezen, jak se potuluje v okolí {0}. Subjekt byl okamžitě terminován Devítiocasou liškou a poslán na pitvu. Infekce SCP-008 byla potvrzena, načež bylo tělo spáleno.
008.gate.a = brány A
008.gate.b = brány B
008zombie = Subjekt D-9341. Příčina smrti: mnohočetné tržné rány a vážné poranění tupým předmětem způsobené [DATA ZLIKVIDOVÁNA], který byl infikován SCP-008. Uvedený subjekt byl nalezen Devítiocasou liškou a terminován.
012 = Subjekt D-9341 nalezen v kaluži krve vedle SCP-012. Zdá se, že si subjekt roztrhl zápěstí a dopsal do kompozice tři řádky navíc předtím, než zemřel na následky ztráty krve.
035.chamber = Subjekt D-9341 nalezen mrtvý v zadržovací komoře SCP-035. Subjekt vykazuje silné krvácení do očí a krvácení uvnitř úst a nosu. Odeslán na pitvu.
035.tentacle = "Na tohle budeme potřebovat mnohem víc než jen běžný úklidový tým. Uvnitř komory se zřejmě vytvořily dva velké a vysoce aktivní výběžky podobné chapadlům. Jejich úroveň agresivity se nepodobá ničemu, co jsme dosud viděli - vypadá to že během prolomení zadržení ubily k smrti nějakého nešťastníka třídy D."
035.tentacle.office = "Zdá se, že zvenčí mrtvého těla vědce v kancelářské oblasti [VYMAZÁNO] vyrostl jeden velký a vysoce aktivní výběžek podobný chapadlu. Jeho úroveň agresivity se nepodobá ničemu, co jsme dosud viděli - vypadá to že během prolomení zadržení ubil k smrti nějakého nešťastníka třídy D."
049 = Aktivní instance SCP-049-2 byla nalezena v [VYMAZÁNO]. Terminována Devítiocasou liškou.
049.chamber = Tři (3) aktivní instance SCP-049-2 nalezené v tunelu před zadržovací komorou SCP-049. Terminováno Devítiocasou liškou.
0492 = Subjekt D-9341. Příčina smrti: mnohočetné tržné rány a vážné poranění tupým předmětem způsobené instancí SCP-049-2.
096 = Velké množství krve nalezeno v [DATA VYMAZÁNA]. DNA identifikována jako Subjekt D-9341. S největší pravděpodobností ho SCP-096 [DATA VYMAZÁNA].
106.pd = Subjekt D-9341. Tělo částečně rozložené v důsledku, co se pravděpodobně jeví jako "korozní" účinek SCP-106. Tělo bylo zlikvidováno spálením.
106.pd.crushed = Kromě znetvořeného vzhledu typického pro oběti SCP-106 vykazuje tělo zranění, která dosud nebyla pozorována: masivní zlomenina lebky, tři zlomená žebra, zlomenina ramene a mnohočetné velké tržné rány.
106.pd.fall = Kromě znetvořeného vzhledu typického pro oběti SCP-106 se zdá, že subjekt utrpěl mnohočetné těžké zlomeniny obou nohou.
173 = Subjekt D-9341. Příčina smrti: Fatální zlomenina krční páteře. Předpokládá se, že subjekt byl napaden SCP-173.
173.camera = Subjekt D-9341. Příčina smrti: Fatální zlomenina krční páteře. Záznamy z bezpečnostních kamer potvrdily, že subjekt byl zabit SCP-173.
173.intro = Subjekt D-9341. Příčina smrti: Smrtelná zlomenina krční páteře. Podle náčelníka bezpečnosti Franklina, který byl přítomen v zadržovací komoře SCP-173 během prolomení zadržení, byl subjekt zabit SCP-173, jakmile nastaly poruchy v elektrické síti.
173.doors = "Pokud se nemýlím, jedním z hlavních účelů téhle místnosti bylo zabránit SCP-173 v dalším pohybu v případě prolomení zadržení. Takže, čí to byl geniální nápad tam dát ZASRANÝ VENTILAČNÍ POTRUBÍ O VELIKOSTI ČLOVĚKA?"
205 = Zdá se, že cyklus SCP-205 se po anomáliích pozorovaných během [VYMAZÁNO] vrátil zpět do normálu. Uvnitř komory bylo nalezeno tělo subjektu D-9341. Subjekt vykazuje známky poranění tupým předmětem, typické pro personál, který vstoupil do komory, když byla světla zhasnutá.
420js = Subjekt D-9341 nalezen v kómatu v [DATA VYMAZÁNA]. Subjekt držel v ruce objekt podobný cigaretě, a široce se usmíval. Chemická analýza cigarety nebyla jednoznačná, ačkoli se zdá, že obsahuje vysokou koncentraci neidentifikované chemické látky, jejíž molekulární struktura je pozoruhodně podobná tetrahydrokanabinolu.
427 = "Akutně žádám o podporu MTF Nu-7. Potřebujeme větší palebnou sílu abychom tuhle věc zlikvidovali."
895 = "Zatím víme, že zemřel na zástavu srdce. Tipuji, že to způsobilo SCP-895, ačkoliv nikdy předtím nebylo pozorováno, že by ovlivňovalo videozařízení z takového rozsahu. Je zapotřebí dalšího testování, aby se zjistilo, zda se "červená zóna" SCP-895 zvětšuje."
895.nvg = "Subjekt třídy D pozoroval SCP-895 přes digitální brýle s nočním viděním a zabilo ho to."
895.finenvg = "Subjekt třídy D pozoroval SCP-895 přes digitální brýle s nočním viděním, pravděpodobně vylepšené SCP-914. Je možné, že subjekt byl schopen částečně odolat memetickým efektům díky těmto brýlím. Brýle byly uloženy pro další zkoumání.
914.rough = "Těžce zmrzačená mrtvola nalezena uvnitř výstupní kabiny SCP-914. Test DNA identifikoval mrtvolu jako Subjekt D-9341. Subjekt byl očividně "zdokonalen" v SCP-914 podle nastavení "Drsné". Stále nevíme, jak se dostal do vstupní kabiny a kdo nebo co otočilo klíčem..
914.superman = Overal třídy D nalezený v [DATA VYMAZÁNA]. Po dalším zkoumání bylo zjištěno, že overal byl naplněn 12,5 kilogramy modré látky podobné popelu. Chemická analýza látky zůstává nejednoznačná. S největší pravděpodobností souvisí s SCP-914.
939 = "Všechni čtyři (4) uniklý jedinci SCP-939 byli úspěšně chyceny a znovu zadrženy. Tři (3) z nich nadělali pořádný nepořádek ve Skladovací oblasti 6. Byl vyslán úklidový tým."
1025.cardiacarrest = "Zemřel na zástavu srdce po pročtení SCP-1025, to je jisté. Existuje něco jako psychosomatická zástava srdce, nebo má SCP-1025 nějaké anomální vlastnosti, o kterých si zatím nejsme vědomi?"
1123 = Subjekt D-9341 byl zastřelen poté, co se pokusil zaútočit na člena Devítiocasé lišky. Záznamy z bezpečnostních kamer ukázaly, že se subjekt přibližně 9 minut předtím potuloval okolo a křičel čínsky frázi "zbavte se čtyř škůdců". SCP-1123 bylo nalezeno v nedalekém [VYMAZÁNO], což naznačuje, že s ním subjekt přišel do fyzického kontaktu. Jak přesně se SCP-1123 dostalo ven ze zadržovací komory zatím není známo.
1048a = Mrtvé tělo pokryté ušima bylo nalezeno v [VYMAZÁNO]. Subjekt byl pravděpodobně napaden instancí SCP-1048-A a udušen ušima. Tělo bylo posláno na pitvu.
1162 = Mrtvý člen třídy D byl nalezen v zadržovací komoře SCP-1162. Pitva odhalila, že subjektu chybí pravá plíce, což naznačuje interakci s SCP-1162.
1499 = Současné místo pobytu SCP-1499 je stále neznámé, ale průzkumný tým byl vyslán k vyšetřování hlášení o násilném útoku na kostel v ruském městě [VYMAZÁNO].
14991 = Neidentifikovatelný muž a subjekt třídy D byli nalezeni Devítiocasou liškou v [VYMAZÁNO]. Muž byl popsán jako velmi rozrušený a zdá se, že mluví pouze rusky. Byl převezen do dočasné zadržovací oblasti v [VYMAZÁNO], kde čeká na příjezd tlumočníka.
14991.dimension = Veškerý personál nacházející se v evakuačním krytu LC-2 během prolomení zadržení byl kvůli incidentu 1499-E oštřen amnestiky třídy B. Subjekt třídy D zapojený do události zemřel krátce poté, co byl postřelen agentem [VYMAZÁNO]. 
guard.intro = Subjekt D-9341. Příčina smrti: Střelná rána do hlavy. Záznamy z bezpečnostních kamer potvdily, že subjekt byl zlikvidován agentem Ulgrinem krátce po zahájení nouzového uzamčení oblasti.
guard.gate.b = "Agent G. centrále. Zlikvidoval jsem uprchlíka třídy D na nádvoří u brány B."
apache = "CH-2 centrále. Sestřelili jsme uprchlíka třídy D u {0}."
apache.gate.a = brány A
apache.gate.b = brány B
ntf = Subjekt D-9341. Terminován Devítiocasou liškou.
ntf.bloodloss = Subjekt D-9341. Zemřel na následky ztráty krve poté, co byl postřelen Devítiocasou liškou.
tesla = Subjekt D-9341 zabit Tesla bránou v [VYMAZÁNO].
killbat = Subjekt D-9341 nalezen mrtvý uvnitř výstupní kabiny SCP-914 vedle něčeho, co vypadá jako obyčejná devítivoltová baterie. Subjekt utrpěl popáleniny 3. stupně a předpokládá se, že zemřel v důsledku úrazu elektrickým proudem způsobeného baterií. Baterie byla uložena k dalšímu zkoumání.
suicide_1 = [VYMAZÁNO]
suicide_2 = Subjekt D-9341 nalezen mrtvý v sektoru [VYMAZÁNO]. Zdá se, že subjekt neutrpěl žádné fyzické poškození a neexistuje žádná viditelná známka toho, co ho zabilo. Tělo bylo posláno na pitvu.
suicide_3 = EXCP_ACCESS_VIOLATION
suicide_4 = Subjekt D-9341 nalezen mrtvý v sektoru [VYMAZÁNO]. Zdá se, že subjekt vedle sebe načmáral vlastní krví písmena „kys“. Nebyly pozorovány žádné další známky fyzického traumatu ani boje. Tělo bylo odesláno k pitvě.
gassed = Subjekt D-9341 nalezen mrtvý v [DATA VYMAZÁNA]. Příčina smrti: Udušení dekontaminačním plynem.

