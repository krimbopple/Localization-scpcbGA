[Option Tooltip]
; Graphics
vsync = "Vertikální synchronizace" čeká na dokončení aktuálního obnovovacího cyklu displeje před výpočtem dalšího snímku, čímž se předchází problémům, jako je trhání obrazovky. Tím se snímková frekvence hry omezí na obnovovací frekvencí displeje a může způsobit menší problémy s odezvou.
antialias = "Anti-Aliasing" neboli vyhlazování hran se požívá k vyhlazení vykresleného obrazu před zobrazením, aby se omezila zubatost kolem okrajů modelů.
gamma = "Korekce gamy" se používá k dosažení dobrého faktoru jasu, který vyrovnává gamu displeje, pokud se hra jeví jako příliš tmavá nebo světlá. Nastavení příliš vysoké nebo nízké hodnoty může způsobit, že grafika bude vypadat méně detailně.
texlod = "Posun úrovně detailu" ovlivňuje vzdálenost, ve které se detaili textury změní, aby se zabránilo zubatění. Tuto možnost změňte, pokud textury blikají nebo jsou přilíš rozmazané. 
vram = Textury uložené ve videopaměti RAM se načítají rychleji. Má ale také negativní vliv na kvalitu textur.
hudoffset = "Posun HUD" se používá sek posunutí ukazatelů výdrže a mrkání, stejně jako HUD různých položek směrem ke středu obrazovky. Primárně určeno pro použití s ultraširokoúhlými monitory.
fov = "Zorné pole" (Field of view) je úhel herního obrazu, které je během hry zobrazeno.

; Audio
musicvol = Upravuje hlasitost hudby v pozadí. Posunutí lišty úplně doleva ztlumí veškerou hudbu.
soundvol = Upravuje hlasitost zvukových efektů. Posunutí lišty úplně doleva ztlumí všechny zvuky.
sfxautorelease = "Automatické uvolnění zvuku" uvolní zvuk z paměti, pokud není používán déle než 5 sekund. Předchází problémům s alokací paměti.
usertrack = Přepíná možnost přehrávání vlastních skladeb přes kanál 1 v rádiu. Tyto skladby se načítjí z adresáře "SFX\Radio\UserTracks\" directory. Pro změnu skladby při používání rádia stiskněte "1".
usertrackmode = Nastaví režim přehrávání pro vlastní skladby. "Opakovat" přehraje všechny soubory v abecedním pořadí. "Náhodně" vybere další skladbu náhodně.
usertrackmode.note = Pamatuj, že režim náhodného přehrávání nebrání opakování dříve přehrávaných skladeb.
usertrackscan = Znovu zkontroluje adresář uživatelských skladeb, zda neobsahuje nové nebo odstraněné zvukové soubory.

; Controls
mousesensitivty = Upravuje rychlost ukazatele myši.
mousesmoothing = Upravuje míru vyhlazení ukazatele myši.
binds = Konfiguruje schéma ovládání ve hře.

; Advanced
showhud = Zobrazí ukazatele výdrže a mrkání.
console = Přepíná možnost používat konzoli. Lze použít ve hře stisknutím {0}.
console.note = Používání konzole zamezí získání achivementů ve službě Steam.
speedrunmode = Zobrazuje časomíru a mění způsob, jak se měří čas ve hře, aby odpovídal požadavkům speedrunu.
numericseeds = Umožňuje zadávat seed jako celé číslo, které se použije k přímému nastavení interního generátoru náhodných čísel (RNG) hry. Pokud není zadán žádny seed, použije se počet milisekund po spuštění počítače.
achpopup = Zobrazí vyskakovací oznámení při odemknutí achivementu.
launcher = Umožňuje znovu použít launcher, pokud byl vypnutý.
showfps = Ukazuje počet snímků za sekundu v levém horním rohu.
framelimit = Omezuje snímkovou frekvenci na požadovanou hodnotu, při které hra bude běžet.
framelimit.note = Obvykle se preferuje 60 FPS nebo vyšší. Pokud si při tomto nastavení všimnete nadměrného zasekávání, zkuste ji snížit, aby byla snímková frekvence konzistentnější.

