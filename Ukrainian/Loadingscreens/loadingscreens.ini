[Фонд SCP]
image path = foundationlogo.jpg
align x = left
align y = top
text1 = Фонд SCP - це організація, яка займається стримуванням та дослідженням аномальних артефактів і форм життя.
text2 = "SCP" розшифровується як "Спеціальні процедури зберігання". Офіційний девіз Фонду: "Охороняти, Утримувати, Захищати", що підсумовує цілі та методи дій організації.
