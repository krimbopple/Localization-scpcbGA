[Мобільна оперативна група]
image path = mtf.jpg
align x = center
align y = center
text1 = МОГ - це невеликі підрозділи (зазвичай від десяти до двадцяти оперативників, хоча групи чисельністю понад 50 осіб також не є рідкістю), які спеціалізуються на виконанні конкретних завдань або реагуванні на визначені ситуації.
text2 = Мобільна оперативна група E-11 («Дев'ятихвостий Лис») - це висококваліфікований підрозділ, що спеціалізується на захисті та повторному утриманні об'єктів SCP, які зберігаються в Зоні-[ДАНІ ВИДАЛЕНО].
text3 = Їхнє завдання включає усунення порушень умов стримування шляхом повторного захоплення всіх активних і ворожих SCP, порятунок персоналу Фонду, який вижив, а також нейтралізацію будь-якого агресивного персоналу класу D. 

[Окуляри нічного бачення]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = Стандартні окуляри нічного бачення видаються підрозділам МОГ у разі відключення електропостачання.
text2 = Науковому персоналу їх також надають, однак під час відключення електроенергії рекомендовано зосередитися на евакуації.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 був знайдений археологом К.М. Сандовалем під час розкопок гробниці на півночі Італії. Об'єкт, рукописний музичний уривок під назвою «На горі Голгофа», виглядає неповним.
text2 = Червоно-чорне чорнило спочатку вважалося якоюсь формою ягідного соку або натурального барвника, але пізніше було ідентифіковане, як людська кров багатьох суб'єктів.
text3 = Кільком учасникам тестування було надано доступ до композицію. У кожному випадку учасники калічили себе, щоб використати власну кров для завершення твору, що призвело до подальших симптомів психозу та великої травми.

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 виглядає як біла порцелянова маска коміка, хоча часом воно змінює вигляд на маску трагіка.
text2 = При розміщенні SCP-035 на обличчі тієї чи іншої особи, мозкові хвилі носія перекриваються альтернативними хвилями об'єкта, що призводить до припинення мозкової діяльності та смерті мозку носія і замінення його свідомості свідомістю, що мешкає всередині SCP-035.
text3 = психологічний аналіз виявив, що SCP-035 володіє надзвичайно маніпулятивним характером і здатне викликати раптові та глибокі зміни психологічного стану співрозмовника. SCP-035 має сильну схильність до садизму і здатне переконати деяких співрозмовників покінчити життя самогубством.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = SCP-049 має гуманоїдний вигляд; проте Фонд наразі не може детальніше вивчити його обличчя та тіло, оскільки він вкритий тим, що, схоже, є одягом традиційного Чумного Лікаря Європи XV-XVI століть.
text2 = SCP-049 Дотик незмінно смертельний для людей. Після контакту з рукою(-ами) SCP-049, жертва (далі SCP-049-2) страждає від [ДАНІ ВИДАЛЕНО] та помирає за лічені хвилини.
text3 = SCP-049 потім дістає сумку з [ДАНІ ВИДАЛЕНО], що містить скальпелі, голку, нитку та кілька флаконів з поки що неідентифікованою речовиною, і починає препарувати SCP-049-2, а також вводити в тіло різні хімічні речовини.
text4 = Приблизно через 20 хвилин SCP-049 знову зашиває SCP-049-2 та знову стає слухняним. Через кілька хвилин SCP-049-2 відновлює життєво важливі показники та, здається, реанімується.

[SCP-066]
image path = 066.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-066 - це аморфна маса складно сплетених ниток вагою приблизно один кілограм.
text2 = Після інциденту 066-2 поведінка SCP-066 почала суперечити його попереднім властивостям.
text3 = SCP-066 стало значно рухомішим, що перш за все проявляється у здатності рухати щупальцевидними частинами з дуже високою швидкістю.

[SCP-079]
image path = 079.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-079 – це мікрокомп'ютер Exidy Sorcerer, сконструйований у 1978 році.
text2 = Невідомо, коли SCP-079 набув свідомості, але відомо, що його програмне забезпечення розвинулося до того, що його апаратне забезпечення не могло впоратися з ним навіть теоретично.
text3 = Він пройшов тест Тюрінга і є досить балакучим, хоча й дуже грубим і ненависним. Він також демонструє зловмисне бажання втекти.

[SCP-096]
image path = 096.png
align x = right
align y = bottom
disablebackground = true
text1 = SCP-096, як правило, надзвичайно спокійний, датчики тиску всередині його камери свідчать про те, що він проводить більшу частину дня, ходячи вздовж східної стіни.
text2 = Проте, коли хтось бачить обличчя SCP-096 – безпосередньо, через відеозйомку чи навіть фотографію, – у об'єкта починається стан, подібний до значного емоційного стресу.
text3 = Приблизно через одну-дві хвилини після першого перегляду SCP-096 починає бігти в напрямку людини, яка подивилася на його обличчя

[SCP-106]
image path = 106.jpg
align x = right
align y = bottom
text1 = SCP-106 виглядає як гуманоїд, схожий на людину похилого віку з загальними ознаками гниття. Його вигляд може відрізнятись, але ознаки "гниття" спостерігаються в усіх випадках.
text2 = SCP-106 викликає корозійний ефект в будь-якому твердому матеріалу, до якого він торкається, яке проявляється у тому, що зачеплений матеріал починає розкладатись через декілька секунд після контакту. Це виглядає як іржавіння, гниття та розтріскування матеріалу, і поява чорної, подібної до мускусу субстанції, яка схожа на ту, що покриває SCP-106.
text3 = SCP-106 здатен проходити крізь тверді матеріали, залишаючи за собою слід з великої кількості корозійного мускусу. SCP-106 демонструє здатність "входити" в твердий матеріал, потрапляючи у щось на зразок "кишенькового виміру".

[SCP-173]
image path = 173.jpg
align x = left
align y = bottom
text1 = SCP-173 виготовлений з бетону та арматури зі слідами аерозольної фарби марки Krylon. Об'єкт SCP-173 оживлений і вкрай ворожий.
text2 =  Об'єкт не може рухатися в той час, коли перебуває в межах прямої видимості. При роботі з SCP-173 треба постійно зберігати зоровий контакт з об'єктом Персонал, призначений для входу в контейнер, проінструктований попереджати один одного перед тим, як моргнути.

[SCP-205]
image path = 205.jpg
align x = right
align y = bottom
disablebackground = true
text1 = SCP-205 – це пара прожекторів, які використовуються у фотографії. Світло, що випромінює кожна лампа, поводиться унікально для об’єкта.
text2 = Якщо світло від SCP-205 продовжує безперервно проходити через будь-яку речовину, кожна лампа відображатиме тінь непізнаної молодої жінки на будь-якій плоскій білій поверхні.
text3 = Спостереження показують, що ефект проявляється лише на білих поверхнях і не впливає на решту оточення.

[SCP-294]
image path = 294.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-294 виглядає як стандартний торговельний автомат для кави, єдиною помітною відмінністю є сенсорна панель для вводу запиту із кнопками, що відповідають англійській QWERTY-клавіатурі.
text2 = користувачеві буде запропоновано ввести назву будь-якої рідини за допомогою панелі. Після цього автомат надає стандартний 12-унційовий стаканчик та наливає до нього вказану рідину. 
text3 = Було проведено дев'яносто сім початкових випробувань (включаючи запити на воду, каву, пиво та содову, нехарчові речовини, такі як сірчана кислота, рідина для чищення склопластику та моторне масло, а також речовини, які зазвичай не існують у рідкому стані, такі як азот, залізо і скло), і кожен з цих запитів було виконано.

[SCP-372]
image path = 372.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-372 є істотою невідомого біологічного виду, приблизно 2 метри завдовжки від голови до хвоста та вагою близько 45 кілограмів. Має довге, тонке тіло з вісьмома парами вузьких кінцівок.
text2 = SCP-372 навчилося адаптувати свої рухи до навколишніх імпульсів, прогнозуючи дії будь-кого поблизу. Воно використовує цю здатність, щоб ховатися за головою особи, яка його шукає, або в скотомах (сліпих плямах).
text3 = У разі порушення умов утримання всьому персоналу рекомендовано повідомляти про будь-які короткочасні мерехтливі рухи, помічені периферійним зором.

[SCP-427]
image path = 427.jpg
align x = center
align y = bottom
disablebackground = true
text1 =  SCP-427 – маленький, сферичний, прикрашений різьбленням медальйон з полірованого сріблястого матеріалу. Різьблення, здається, не виконує ніякої функції.
text2 = SCP-427 був створений з таблетки SCP-500, яку помістили у кабінку для сировини SCP-914 та обробили у режимі "Тонко". У закритому стані він не проявляє ніякої незвичної активності. Коли SCP-427 відкритий і спрямований на біологічну тканину, він швидко регенерує пошкодження її клітин і якимось чином очищує від чужорідних сполук або інфекцій.
text3 = Проте довгострокове опромінення створює значну небезпеку для здоров'я. Оскільки медальйон зцілює ушкодження, він оптимізує природні системи організму. Піддослідні класу D, яких опромінювали пристроєм більш ніж годину, почали мутувати у безформну масу тканини.
text4 = Ці "М'ясні Потвори" (так їх прозвали через їхній зовнішній вигляд), створені SCP-427, є неймовірно агресивними та без розбору атакують всіх людей, яких бачать, зі смертельними результатами. Вони дуже стійкі до більшості відомої зброї.

[SCP-500]
image path = 500.jpg
align x = right
align y = bottom
text1 = SCP-500 - це мала пластикова банка, котра наразі містить сорок сім (47) червоних пігулок.
text2 = Кожна пілюля, при прийманні всередину, ефективно виліковує суб'єкта від усіх недуг протягом двох годин, точний час залежить від кількості та тяжкості хвороб суб'єкта.
text3 = Численні спроби синтезу з'єднання, яке, імовірно, є дієвою речовиною таблеток, не увінчалися успіхом.

[SCP-513]
image path = 513.jpg
align x = center
align y = center
disablebackground = true
text1 = Фізично SCP-513 виглядає як непримітний іржавий коров'ячий дзвоник. Ніяких знаків або різьблень на його поверхні не видно через сильну корозію.
text2 = Приблизно через годину після впливу потерпілі починають бачити краєм зору SCP-513-1.
text3 = Всі допити, проведені на сьогодні, вказують на те, що SCP-513-1 – це високий і худий гуманоїд з аномально великими долонями.

[SCP-682]
image path = 682.jpg
align x = right
align y = bottom
text1 = SCP-682 – це велике створіння рептильної зовнішності та невідомого походження. SCP-682, схоже, ненавидить все живе, що він висловив у декількох інтерв'ю під час утримування
text2 = У SCP-682 завжди спостерігаються надзвичайно високі міцність, швидкість і рефлекси, хоча точний їх рівень залежить від загальної форми. Відновлювальні можливості та стійкість SCP-682 вражають: об'єкт здатен рухатися і розмовляти зі зруйнованим на 87% тілом.
text3 = SCP-682 має бути знищений як можливо швидше.

[SCP-714]
image path = 714.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-714 на перший погляд – звичайний перстень із зеленого нефриту. Він здатний розширюватися та стискатися, підлаштовуючись під палець.
text2 = Носіння SCP-714 спричиняє втому, примус до відпочинку або сну, уповільнення реакцій та зниження розумових здібностей.
text3 = Особи, які носять Нефартове кільце, демонструють підвищену толерантність до хімічних речовин і аномально високу стійкість до меметичних і психічних впливів.

[SCP-860]
image path = 860.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-860 — це темно-синій ключ непримітної форми.
text2 = Через, здавалося б, випадкові проміжки часу, на його лезі починає з'являтися серія чисел, які згодом утворюють координати UTM.
text3 = SCP-860 підходить для будь-яких дверних замків, що потребують ключа, які розміщені в області за заданими координатами.
text4 = Якщо за допомогою SCP-860 відімкнути двері та відчинити їх, то вони не приведуть до звичайного місця призначення. Замість цього суб'єкт потрапить на невелику лісову галявину з пішохідною доріжкою, шириною 80 см, позначену як SCP-860-1.

[SCP-895]
image path = 895.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-895 – це прикрашена дубова труна, виявлена персоналом SCP █.██.██ у морзі █████ █████
text2 = SCP-895 спричиняє збій обладнання відео- та фото спостереження в межах 50 метрів, подібний до яскравих, тривожних галюцинацій з різною тривалістю і регулярністю, залежно від близькості камери до SCP-895.
text3 = В межах 5 метрів від SCP-895 зняті кадри можуть призвести до серйозних психологічних травм та істерій у більшості суб'єктів.

[SCP-914]
image path = 914.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-914 – це великий пристрій з часовим механізмом, що важить декілька тонн, займає площу у вісімнадцять квадратних метрів і складається з гвинтових передач, ременів, шківів, зубчастих коліс, пружин та інших подібних деталей. 
text2 = Коли об'єкт поміщається у впускну кабіну та ключ заводиться, SCP-914 "очищує" його. В процесі енергія не втрачається, а об'єкт очищується відповідно до налаштувань, зазначених на передній панелі 914.
text3 = Заборонено вносити до SCP-914 жодні органічні речовини.

[SCP-939]
image path = 939.jpg
align x = left
align y = top
disablebackground = true
text1 =  SCP-939 - це ендотермічні стайні хижаки, у яких має місце характерна для троглобіонтів атрофія деяких систем органів. Шкіра SCP-939 прозора, має червоний колір. Середній зріст осіб SCP-939 сягає 2,2 метри в вертикальному положенні, а середня вага - 250 кілограмів, хоча вага конкретної особи може дуже відрізнятись від середньої.
text2 = Головним методом приманювання здобичі SCP-939 є імітування людських голосів, зазвичай голосів її попередніх жертв, однак, були зареєстровані випадки, коли істоти під час нічних полювань імітували звуки інших тварин.
text3 = Здобич зазвичай вбивається єдиним укусом до черепа або шиї; сила прикусу становить 35 МПа.


[SCP-966]
image path = 966.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-966 можливо побачити лише в діапазоні довжини хвиль, який коливається, приблизно, від 700 нм до 900 нм. Це стосується усіх типів тканин SCP-966. 
text2 = Їхні методи полювання складаються з випромінювання одного сигналу раніше невідомої хвилі, яка перманентно пригнічує здатність ураженої істоти входити до будь-якого з етапів швидкого та повільного сну. Здатність до мікросну також втрачається.
text3 = Позбавивши своїх жертв сну, SCP-966 буде переслідувати свою здобич до того моменту, поки вона не втратить свідомість через відсутність відпочинку. У цей момент SCP-966 візьметься до споживання. 

[SCP-970]
image path = 970.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-970 - це просторове явище, яке приводить до зациклення приміщення. В усіх випадках цей ефект проявляє себе через появу серії дверей у стінах, при чому всі двері розташовані за прямою лінією та дозволяють пройти через них і опинитися на стартової позиції. 
text2 = Цей ефект не має жодного впливу на сусідні кімнати та поверхи. На теперішній час немає жодного пояснення природи цього явища.
text3 = З часу цього інциденту, було знайдено ще ██ випадків цього явища, при чому ██% мали місце в радіусі 800 кілометрів від Сектора 19.

[SCP-1025]
image path = 1025.jpg
align x = right
align y = bottom
text1 = SCP-1025 – це книга у твердій палітурці, приблизно 1500 сторінок. На обкладинці та корінці надруковано "Енциклопедія поширених хвороб".
text2 = Всі відомі екземпляри SCP-1025 мають однакову назву та видавця, інших примірників не знайдено.
text3 = Читачі, що взаємодіють із книгою, демонструють симптоми будь-якої хвороби, про яку читають, ефект проявляється через _ до __ годин.

[SCP-1123]
image path = 1123.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-1123 – це людський череп без нижньої щелепи та всіх зубів. На зовнішній лобовій лусці написано сучасним кхмерським шрифтом "Пам'ятай".
text2 = Генетичне тестування підтверджує, що череп та кров належать одній особі SCP-1123.
text3 = Суб’єкти, що знаходяться на відстані 1 метра або менше, повідомляють про свіжість крові, ніби вона ще волога, а також про інші аномальні сенсорні явища..

[SCP-1162]
image path = 1162.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-1162 наразі являє собою отвір у стіні з шлакоблоків у Зоні-[ДАНІ ВИДАЛЕНО].
text2 = Взаємодія з SCP-1162 активує механізм, коли розумна істота засовує руку в отвір і торкається предмету, що проходить через отвір.
text3 = Зазначені предмети зазвичай є тими, що користувач шукав або втратив у минулому.

[SCP-1499]
image path = 1499.jpg
align x = right
align y = bottom
disablebackground = true 
text1 = SCP-1499 — радянський протигаз ГП-5. Випробування і опресовування показали, що об'єкт досить герметичний для використання за прямим призначенням.
text2 = Аномальний ефект проявляється при надяганні SCP-1499 на голову людини. Приблизно через одну секунду після повного надягання об'єкта на голову суб'єкт пропадає з виду і не реєструється жодними приладами.
text3 = Одягнувши SCP-1499, піддослідні, за їхніми словами, опиняються в місці, що радикально відрізняється від того, в якому перебували до того.

[Повстанці Хаосу]
image path = chaos.jpg
align x = left
align y = bottom
disablebackground = true
text1 = Повстанці Хаосу - це відколовше угруповання Фонду, створене шахрайським осередком, який самовільно втік з кількома цінними SCP-об'єктами у 1924 році.
text2 = Місцезнаходження головної оперативної бази та імена лідерів Повстанців невідомі. Організація є прямим антагоністом Фонду і неодноразово вступала у конфлікти через SCP.
text3 = Персонал має бути обізнаний про можливі рейди, спроби тероризму та шпигунства з боку Повстанців, а також повідомляти командування про будь-яку підозрілу поведінку інших співробітників.

[Персонал Класу-D]
image path = classd.jpg
align x = right
align y = bottom
text1 = Персонал класу D - це призначені особи для роботи з об'єктами рівня Кетер.
text2 = Персонал класу D набирається з числа ув'язнених. Перевага надається засудженим особам; за необхідності може застосовуватися Протокол 12, що дозволяє вербувати невинних або ув'язнених за менш тяжкі злочини.
text3 = Усі співробітники класу D звільняються на початку місяця, а новий персонал має бути готовий до заміни.

