[Death Message]
008 = Суб'єкт D-9341 поїдав лікаря [ВИДАЛЕНО] у секторі [ВИДАЛЕНО]. Суб'єкт був негайно знищений Дев'ятихвостою лисицею і був направлений на розтин. Інфекцію SCP-008 було підтверджено, після чого тіло було спалено.
008.gate = Суб'єкт D-9341 виявлений блукаючим у {0}. Суб'єкт був негайно знищений Дев'ятихвостою лисицею і був направлений на розтин. Інфекцію SCP-008 було підтверджено, після чого тіло було спалено.
008.gate.a = Воріт A
008.gate.b = Воріт B
008zombie = Суб'єкт D-9341. Причина смерті: численні рвані рани та травми від ударів тупим предметом, завдані [ДАНІ ВИДАЛЕНІ], який був заражений SCP-008. Цей суб'єкт був виявлений та ліквідований підрозділом Дев'ятихвостої лисиці.
012 = Суб'єкт D-9341 знайдений у калюжі крові поряд із SCP-012. Схоже, що суб'єкт роздер у кров свої зап'ястя і написав три додаткові рядки у композиції, а потім помер від втрати крові.
035.chamber = Суб'єкт D-9341 знайдений мертвим усередині камери вмісту SCP-035. Видно великі крововиливи навколо очей суб'єкта, а також у порожнині рота і носа. Тіло відправлено на експертизу.
035.tentacle = "Щоб з цим розібратися, звичайною групою чистильників не обійдешся. Два великих і дуже активних щупальця, схоже, сформувалися всередині камери. Їхній рівень агресії не схожий на той, що ми бачили раніше. Мабуть, в якийсь момент це щупальце побило як убого.
035.tentacle.office = "Схоже, що одне велике і дуже активне щупальце виросло з трупа вченого в офісі [ВИДАЛЕНО]. Його рівень агресії не схожий на той, що ми бачили раніше. Мабуть, в якийсь момент це щупальце побило якогось бідолаху класу D до смерті.
049 = В [ВИДАЛЕНО] було знайдено активний зразок SCP-049-2. Знищений Дев'ятихвостою лисицею.
049.chamber = У тунелі поруч із камерою SCP-049 було знайдено три (3) активні зразки SCP-049-2. Знищені дев'ятихвостою лисицею.
0492 = Суб'єкт D-9341. Причина смерті: множинні рани та травми, завдані SCP-049-2.
096 = В [ДАНІ ВИДАЛЕНІ] було знайдено велику кількість крові. ДНК належить суб'єкту D-9341. Швидше за все, він був [дані видалені] SCP-096.
106.pd = Суб'єкт D-9341. Тіло частково розклалося, ймовірно, через ефект "корозії" SCP-106. Тіло утилізовано шляхом спалювання.
106.pd.crushed = На додаток до розкладання, типового для всіх жертв SCP-106, на тілі є пошкодження, що не спостерігалися раніше: масивний перелом черепа, три зламані ребра, перелом плеча і множинні важкі рани.
106.pd.fall = На додаток до розкладання, типового всім жертвам SCP-106, суб'єкт отримав множинні важкі переломи обох ніг.
173 = Суб'єкт D-9341. Причина смерті: смертельний перелом шиї. Імовірно, вбито SCP-173.
173.camera = Суб'єкт D-9341. Причина смерті: смертельний перелом шиї. Записи з камер спостереження підтверджують, що суб'єкта було вбито SCP-173.
173.intro = Суб'єкт D-9341. Причина смерті: смертельний перелом шиї. За словами начальника служби безпеки Франкліна, який був присутній у камері SCP-173 під час порушення умов утримання, суб'єкта було вбито SCP-173, як тільки почалися збої в електричній мережі.
173.doors = "Якщо я не помиляюся, одна з основних ідей цих кімнат - зупинити SCP-173, щоб він не просувався далі під час порушень умов утримання. Так чиєю ж блискучою ідеєю було зробити там ЧЕРТОВУ ВЕНТИЛЯЦІЮ ЛЮДСЬКИХ РОЗМІРІВ?!"
205 = Очевидно, цикл SCP-205 повернувся до нормального порядку після аномалій, які спостерігалися під час [ВИДАЛЕНО]. Тіло суб'єкта D-9341 було знайдено усередині камери. Виявлено ознаки травми від удару тупим предметом, що є типовим для всіх, хто входить у камеру з вимкненим світлом.
420js = Суб'єкт D-9341 знайдений у коматозному стані в [ДАНІ ВИДАЛЕНІ]. Суб'єкт тримав у руці предмет, схожий на цигарку, і посміхався. Хімічний аналіз сигарети не дав результатів, але схоже, що вона містить високу концентрацію невідомих хімікатів, молекулярна структура яких схожа на тетрагідроканнабінол.
427 = "Запитую підтримку МОГ Ню-7. Нам потрібно більше вогневої потужності, щоб його знищити."
895 = "Нам відомо, що він помер від серцевого нападу. Мені здається, що це було викликано SCP-895, хоча подібний вплив на відеотехніку з такої відстані не спостерігався раніше. Необхідне подальше дослідження, щоб визначити, чи 'червона зона' SCP-895 розширюється."
895.nvg = "Співробітник класу D дивився на SCP-895 через цифрові окуляри нічного бачення, внаслідок чого загинув."
895.finenvg = "Співробітник Класу D дивився на SCP-895 через цифрові окуляри нічного бачення, ймовірно, покращені за допомогою SCP-914. Цілком можливо, що суб'єкт був здатний частично протистояти меметичному впливу за допомогою цих окулярів. Вони були взяті на зберігання для подальшого.
914.rough = "У відсіку виводу SCP-914 був знайдений сильно понівечений труп. Після аналізу ДНК труп був ідентифікований як суб'єкт D-9341. Очевидно, що суб'єкт був 'перероблений' SCP-914 в режимі 'Грубо', але ми досі не можемо зрозуміти і хто він вказав, як він вказав, як він вказав, як він виявив.
914.superman = В [ДАНІ ВИДАЛЕНІ] було знайдено комбінезон співробітника класу D. При подальшій експертизі з'ясувалося, що комбінезон був наповнений 12,5 кілограмами субстанції, що нагадує синій попіл. Хімічний аналіз субстанції не дав результатів. Швидше за все, це пов'язано з SCP-914.
939 = "Всі четверо (4) особи SCP-939 що втекли, були захоплені і успішно повернуті в належні умови утримання. Троє (3) з них наробили справжній погром у зоні зберігання 6. Була послана бригада чистильників."
1025.cardiacarrest = "Він загинув від серцевого нападу після читання SCP-1025, це точно. Чи є така річ, як психосоматичний серцевий напад, або ж у SCP-1025 є деякі аномальні властивості, про які ми ще не знаємо?"
1123 = Суб'єкт D-9341 був застрелений після спроби напасти на члена Дев'ятихвостої лисиці. Записи з камер спостереження показують, що приблизно за 9 хвилин до цього суб'єкт блукав по Зоні, вигукуючи фразу "позбутися чотирьох шкідників" китайською мовою. Неподалік у [ВИДАЛЕНО] було виявлено SCP-1123; це дає підстави припустити, що суб'єкт вступив із нею у фізичний контакт. Як саме SCP-1123 було вилучено зі своєї камери утримання, досі невідомо.
1048a = В [ВИДАЛЕНО] було виявлено труп. Імовірно, суб'єкт зазнав нападу з боку SCP-1048-A і задихнувся від вух, що проросли всередину тіла. Тіло відправлено на розтин.
1162 = Мертвий суб'єкт класу D був виявлений усередині камери вмісту SCP-1162. A Розкриття показало, що його права легеня була відсутній, що передбачає взаємодію з SCP-1162.
1499 = Місцезнаходження SCP-1499 досі невідоме, проте на розслідування повідомлень про напад із застосуванням насильства на церкву в російському місті [ВИДАЛЕНО] було відправлено розвідгрупу.
14991 = Непізнаний суб'єкт чоловічої статі та мертвий співробітник класу D були виявлені в [ВИДАЛЕНО] Дев'ятихвостою лисицею. Людина, як було зазначено, була дуже збуджена і, схоже, говорила тільки російською. Він був відправлений до тимчасової зони стримування в [ВИДАЛЕНО] до прибуття перекладача.
14991.dimension = Усьому персоналу, що знаходився в евакуаційному притулку LC-2 під час катастрофи, були введені амнезіаки класу B у зв'язку з Інцидентом 1499-E. Суб'єкт класу D, який брав участь у цьому випадку, був застрелений агентом [ВИДАЛЕНО].
guard.intro = Суб'єкт D-9341. Причина смерті: вогнепальне поранення в голову. Записи з камер спостереження підтверджують, що суб'єкта було вбито агентом Алгріном невдовзі після початку блокування зони.
guard.gate.b = "Агент G. Центру. Знищив співробітника класу D, що тікає, у внутрішньому дворі Виходу B."
apache = "CH-2 Центру. Убив співробітника класу D, що тікає, у {0}."
apache.gate.a = Виходу A
apache.gate.b = Виходу B
ntf = Суб'єкт D-9341. Знищений Дев'ятихвостою лисицею.
ntf.bloodloss = Суб'єкт D-9341. Загинув від втрати крові після пострілу Дев'ятихвостої лисиці.
tesla = Суб'єкт D-9341 убитий Тесла-воротами в [ВИДАЛЕНО].
killbat = Суб'єкт D-9341 знайдений мертвим у відсіку виводу SCP-914 поруч із предметом, схожим на звичайну 9V-батарейку. Суб'єкт покритий сильними електричними опіками, передбачається, що він був убитий струмом від батареї. Батарейку взято на зберігання для подальшого вивчення.
suicide_1 = [ВИДАЛЕНО]
suicide_2 = Су'єкт D-9341 знайдений мертвим у секторі [ВИДАЛЕНО]. Схоже, що суб'єкт не отримав фізичних пошкоджень і немає жодних видимих ​​ознак того, що саме його вбило. Тіло відправлено на розтин.
suicide_3 = EXCP_ACCESS_VIOLATION
suicide_4 = Суб'єкт D-9341 знайдений мертвим у секторі [ВИДАЛЕНО]. Схоже, що суб'єкт написав літери "kys" своєю власною кров'ю поряд із собою. Жодних інших ознак фізичного пошкодження чи боротьби не виявлено. Тіло відправлено на розтин.
gassed = Суб'єкт D-9341 знайдений мертвим у [ДАНІ ВИДАЛЕНІ]. Причина смерті: ядуха, спричинена газом.

