[Option Tooltip]
; Graphics
vsync = "Вертикальна синхронізація" очікує, поки дисплей завершить поточний цикл оновлення, перед побудовою наступного кадру. Запобігає розриву кадру. Може спричинити невеликі затримки у малюванні.
antialias = "Згладжування" використовується для згладжування зображення перед його відображенням. Дозволяє позбутися драбинок на моделях.
gamma = "Корекція гами" допоможе досягти балансу яскравості, якщо гра здається занадто темною або світлою. Встановлення занадто великого або низького значення може спричинити погіршення деталізації зображення.
texlod = "Деталізація текстур" встановлює дистанцію, де буде змінюватися деталізація текстур. Змініть цей параметр, якщо текстури мерехтять або виглядають надто розмитими.
vram = Текстури, які зберігаються у відеопам'яті (VRAM), завантажуватимуться швидше. Однак це може спричинити погіршення їхньої якості.
hudoffset = "Зміщення HUD" використовується для переміщення індикаторів витривалості та моргання, а також дисплея різних елементів у центр екрану. Насамперед призначено для ультрашироких моніторів.
fov = "Поле зору" задає кут огляду для гравця під час гри.

; Audio
musicvol = Гучність фонової музики. Проведіть слайдер вліво до кінця, щоб повністю відключити музику.
soundvol = Гучність звукових ефектів. Проведіть слайдер ліворуч до кінця для повного вимкнення звуку.
sfxautorelease = "Автовивільнення звуку" вивільняє з пам'яті звук, який не використовується більше 5 секунд. Запобігає помилкам з розподілом пам'яті.
usertrack = Включає можливість прослуховування треків на 1-му каналі радіо. Треки завантажуються з "SFXRadioUserTracks". Натисніть "1", коли вибрано радіо, щоб прослухати треки.
usertrackmode = Порядок відтворення користувацьких треків. "Повтор" відтворює кожен файл у алфавітному порядку. "Випадково" вибирає наступний трек у випадковому порядку.
usertrackmode.note = Зверніть увагу, що випадковий режим не перешкоджає повтору раніше відтворених треків.
usertrackscan = Перевірити ще раз папку на наявність нових або віддалених треків.

; Controls
mousesensitivty = Регулює швидкість вказівника миші.
mousesmoothing = Згладжує рух вказівника миші.
binds = Налаштування керування у грі.

; Advanced
showhud = Відображає індикатори моргання та витривалості.
console = Включає можливість використання консолі розробника у грі. Відкриється натисканням клавіші {0}.
console.note = Використання консолі вимикає можливість отримання Steam досягнень.
speedrunmode = Відображає таймер і змінює спосіб відстеження часу гри відповідно до вимог спідрану.
numericseeds = Дозволяє вводити сиди у вигляді цілих чисел, які будуть використовуватись для безпосереднього запуску внутрішнього генератора випадкових чисел гри. Якщо сид не введено, використовується кількість мілісекунд, що пройшли з моменту запуску комп'ютера.
achpopup = Під час розблокування досягнення показує спливаюче вікно.
launcher = Дозволяє повторно увімкнути лаунчер, якщо він був вимкнений.
showfps = Відображає кількість кадрів на секунду в лівому верхньому куті екрана.
framelimit = Обмежує частоту кадрів у грі до бажаного значення.
framelimit.note = Краще 60 FPS або вище. Якщо Ви помічаєте надмірну уривчастість кадрів, спробуйте зменшити цей параметр, щоб зробити FPS стабільнішим.
